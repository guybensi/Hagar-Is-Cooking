# Fly.io app config for Hagar Is Cooking.
# App name must be globally unique on Fly -- change it if "hagar-is-cooking" is taken
# (`fly apps create <name>` will tell you, or just edit this file before `fly launch`).
app = "hagar-is-cooking"
primary_region = "ams"

[build]

[env]
  DATABASE_PATH = "/data/hagar_is_cooking.db"
  LOG_LEVEL = "INFO"

# TELEGRAM_BOT_TOKEN / GROQ_API_KEY / TAVILY_API_KEY are NOT set here -- they're secrets,
# set once via `fly secrets set NAME=value` (see README).

[mounts]
  source = "hagar_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
